name: Build precompiled NIF artifacts

# Manual trigger only. This prevents the tag-push → rebuild → stale-checksum loop.
# Release process:
#   1. Tag and push: git tag -a v0.9.1 -m "v0.9.1" && git push origin v0.9.1
#   2. Trigger: gh workflow run release.yml --field tag=v0.9.1
#   3. Workflow builds artifacts, uploads to release, generates checksums,
#      commits checksum file to main, and force-pushes the tag to include it.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build artifacts for (e.g. v0.9.1)"
        required: true

permissions:
  contents: write

env:
  NIF_VERSION: "2.17"

jobs:
  linux:
    name: NIF ${{ matrix.target }} (Linux)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            use-cross: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Extract version
        id: project
        run: |
          echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.event.inputs.tag }}" | sed 's/version=v/version=/' >> "$GITHUB_OUTPUT"

      - uses: philss/rustler-precompiled-action@v1.1.5
        id: build
        with:
          project-name: loro_nif
          project-version: ${{ steps.project.outputs.version }}
          target: ${{ matrix.target }}
          nif-version: ${{ env.NIF_VERSION }}
          use-cross: ${{ matrix.use-cross }}
          project-dir: "native/loro_nif"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.project.outputs.tag }}
          files: ${{ steps.build.outputs.file-path }}
          fail_on_unmatched_files: true

  macos:
    name: NIF ${{ matrix.target }} (macOS)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Extract version
        id: project
        run: |
          echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.event.inputs.tag }}" | sed 's/version=v/version=/' >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build NIF
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: native/loro_nif

      - name: Package artifact
        id: package
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TARGET="${{ matrix.target }}"
          LIB_NAME="libloro_nif"
          SRC="native/loro_nif/target/${TARGET}/release/${LIB_NAME}.dylib"
          INNER_NAME="${LIB_NAME}-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
          ARCHIVE_NAME="${INNER_NAME}.tar.gz"

          cp "${SRC}" "${INNER_NAME}"
          tar -czf "${ARCHIVE_NAME}" "${INNER_NAME}"
          rm "${INNER_NAME}"

          echo "file-path=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.project.outputs.tag }}
          files: ${{ steps.package.outputs.file-path }}
          fail_on_unmatched_files: true

  # After all builds complete, download the artifacts from the release,
  # compute checksums, commit the file to main, and force-push the tag.
  update_checksums:
    name: Update checksums + retag
    needs: [linux, macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download artifacts and generate checksum file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          TARGETS=(
            "libloro_nif-v${VERSION}-nif-${NIF_VERSION}-aarch64-apple-darwin.so.tar.gz"
            "libloro_nif-v${VERSION}-nif-${NIF_VERSION}-aarch64-unknown-linux-gnu.so.tar.gz"
            "libloro_nif-v${VERSION}-nif-${NIF_VERSION}-x86_64-unknown-linux-gnu.so.tar.gz"
          )

          echo "%{" > checksum-Elixir.LoroEx.Native.exs
          for f in "${TARGETS[@]}"; do
            curl -sL -o "/tmp/${f}" "${BASE_URL}/${f}"
            sha=$(sha256sum "/tmp/${f}" | awk '{print $1}')
            echo "  \"${f}\" => \"sha256:${sha}\"," >> checksum-Elixir.LoroEx.Native.exs
            rm "/tmp/${f}"
          done
          echo "}" >> checksum-Elixir.LoroEx.Native.exs

          echo "Generated checksums:"
          cat checksum-Elixir.LoroEx.Native.exs

      - name: Commit checksum file to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-Elixir.LoroEx.Native.exs
          git commit -m "Update precompiled NIF checksums for ${{ github.event.inputs.tag }} [skip ci]" || true
          git push origin main

      - name: Force-push tag to include checksum file
        run: |
          TAG="${{ github.event.inputs.tag }}"
          # Tag the current HEAD (which now includes the checksum commit)
          git tag -fa "${TAG}" -m "${TAG}" HEAD
          git push origin "${TAG}" --force
