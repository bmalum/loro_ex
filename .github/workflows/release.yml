name: Build precompiled NIF artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build artifacts for (e.g. v0.9.0)"
        required: true

permissions:
  contents: write

env:
  NIF_VERSION: "2.17"

jobs:
  # -------------------------------------------------------------------------
  # Linux builds — use rustler-precompiled-action for cross-compilation
  # -------------------------------------------------------------------------
  linux:
    name: NIF ${{ matrix.target }} (Linux)
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            use-cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: project
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: philss/rustler-precompiled-action@v1.1.5
        id: build
        with:
          project-name: loro_nif
          project-version: ${{ steps.project.outputs.version }}
          target: ${{ matrix.target }}
          nif-version: ${{ env.NIF_VERSION }}
          use-cross: ${{ matrix.use-cross }}
          project-dir: "native/loro_nif"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.project.outputs.tag }}
          files: ${{ steps.build.outputs.file-path }}
          fail_on_unmatched_files: true

  # -------------------------------------------------------------------------
  # macOS builds — native cargo build (no cross needed)
  # -------------------------------------------------------------------------
  macos:
    name: NIF ${{ matrix.target }} (macOS)
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: project
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build NIF
        run: |
          cd native/loro_nif
          cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        id: package
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TARGET="${{ matrix.target }}"
          LIB_NAME="libloro_nif"
          EXT="dylib"
          SRC="native/loro_nif/target/${TARGET}/release/${LIB_NAME}.${EXT}"
          ARCHIVE_NAME="${LIB_NAME}-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.tar.gz"

          tar -czf "${ARCHIVE_NAME}" -C "$(dirname ${SRC})" "$(basename ${SRC})"
          echo "file-path=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ARCHIVE_NAME} ($(du -h ${ARCHIVE_NAME} | cut -f1))"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.project.outputs.tag }}
          files: ${{ steps.package.outputs.file-path }}
          fail_on_unmatched_files: true
